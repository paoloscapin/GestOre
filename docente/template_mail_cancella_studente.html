<!-- TEMPLATE 3 - PLACEHOLDERS: {titolo}, {nome}, {messaggio}, {data}, {ora}, {docente}, {materia}, {aula}, {nome_istituto} -->
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<!--[if gte mso 9]>
<xml>
  <o:OfficeDocumentSettings>
    <o:AllowPNG/>
    <o:PixelsPerInch>96</o:PixelsPerInch>
  </o:OfficeDocumentSettings>
</xml>
<![endif]-->
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-apple-disable-message-reformatting">
<!--[if !mso]><!--><meta http-equiv="X-UA-Compatible" content="IE=edge"><!--<![endif]-->
<title></title>

<style type="text/css">
  body { margin:0; padding:0; background-color:#293c4b; }
  table { border-collapse:separate; }
  td { color:#000000; }
  p { margin:0; }
  a { color:#3598db; text-decoration:none; }
  a[x-apple-data-detectors="true"] { color:inherit !important; text-decoration:none !important; }
  .wrap { width:550px; max-width:550px; margin:0 auto; }
  .card { background:#ffffff; border-radius:10px; overflow:hidden; }
  .header { background:#169179; padding:28px 20px 18px; text-align:center; }
  .title { font-family:Montserrat, Arial, Helvetica, sans-serif; font-size:28px; font-weight:700; line-height:1.25; color:#ecf0f1; }
  .subtitle { font-family:Lato, Arial, Helvetica, sans-serif; font-size:13px; line-height:1.4; color:#ecf0f1; opacity:0.95; margin-top:6px; }
  .body { padding:22px 22px 22px; }
  .greet { font-family:Montserrat, Arial, Helvetica, sans-serif; font-size:18px; font-weight:700; color:#293c4b; margin-bottom:10px; }
  .text { font-family:Lato, Arial, Helvetica, sans-serif; font-size:14px; line-height:1.55; color:#656e72; }
  .spacer { height:14px; line-height:14px; font-size:0; }
  .infoCard { border:1px solid #e7ecef; border-radius:8px; background:#f7fbfb; }
  .rowKey { font-family:Lato, Arial, Helvetica, sans-serif; font-size:13px; font-weight:700; color:#169179; padding:10px 12px; width:40%; }
  .rowVal { font-family:Lato, Arial, Helvetica, sans-serif; font-size:13px; color:#293c4b; padding:10px 12px; }
  .divider { border-top:1px solid #e7ecef; }
  .badgeWrap { padding:18px 10px 26px; text-align:center; }
  .badge { display:inline-block; background:#169179; color:#ffffff; padding:12px 16px; border-radius:8px; font-family:Lato, Arial, Helvetica, sans-serif; font-size:12px; line-height:1.4; }
  @media only screen and (max-width:570px){
    .wrap { width:100% !important; max-width:100% !important; }
    .body { padding-left:14px !important; padding-right:14px !important; }
  }
</style>

<!--[if !mso]><!-->
<link href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet" type="text/css">
<!--<![endif]-->
</head>

<body style="background-color:#293c4b;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#293c4b;">
    <tr>
      <td align="center" style="padding:18px 10px 0;">
        <table class="wrap" width="550" cellpadding="0" cellspacing="0" role="presentation">
          <tr>
            <td class="card" style="background:#ffffff;border-radius:10px;overflow:hidden;">

              <!-- HEADER -->
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td class="header" style="background:#169179;padding:28px 20px 18px;text-align:center;">
                    <div class="title" style="font-family:Montserrat, Arial, Helvetica, sans-serif;font-size:28px;font-weight:700;line-height:1.25;color:#ecf0f1;">
                      {titolo}
                    </div>
                    <div class="subtitle" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;line-height:1.4;color:#ecf0f1;opacity:0.95;margin-top:6px;">
                      GestOre • {nome_istituto}
                    </div>
                  </td>
                </tr>
              </table>

              <!-- BODY -->
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td class="body" style="padding:22px 22px 22px;">
                    <div class="greet" style="font-family:Montserrat, Arial, Helvetica, sans-serif;font-size:18px;font-weight:700;color:#293c4b;margin-bottom:10px;">
                      Buongiorno {nome},
                    </div>

                    <div class="text" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:14px;line-height:1.55;color:#656e72;">
                      {messaggio}
                    </div>

                    <div class="spacer" style="height:14px;line-height:14px;font-size:0;">&nbsp;</div>

                    <!-- INFO CARD -->
                    <table class="infoCard" width="100%" cellpadding="0" cellspacing="0" role="presentation"
                      style="border:1px solid #e7ecef;border-radius:8px;background:#f7fbfb;">
                      <tr>
                        <td>
                          <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                            <tr>
                              <td class="rowKey" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;font-weight:700;color:#169179;padding:10px 12px;width:40%;">📅 Data</td>
                              <td class="rowVal" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;color:#293c4b;padding:10px 12px;">{data}</td>
                            </tr>
                            <tr><td class="divider" colspan="2" style="border-top:1px solid #e7ecef;"></td></tr>
                            <tr>
                              <td class="rowKey" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;font-weight:700;color:#169179;padding:10px 12px;width:40%;">⏰ Orario</td>
                              <td class="rowVal" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;color:#293c4b;padding:10px 12px;">{ora}</td>
                            </tr>
                            <tr><td class="divider" colspan="2" style="border-top:1px solid #e7ecef;"></td></tr>
                            <tr>
                              <td class="rowKey" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;font-weight:700;color:#169179;padding:10px 12px;width:40%;">👨‍🏫 Docente</td>
                              <td class="rowVal" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;color:#293c4b;padding:10px 12px;">{docente}</td>
                            </tr>
                            <tr><td class="divider" colspan="2" style="border-top:1px solid #e7ecef;"></td></tr>
                            <tr>
                              <td class="rowKey" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;font-weight:700;color:#169179;padding:10px 12px;width:40%;">📘 Materia</td>
                              <td class="rowVal" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;color:#293c4b;padding:10px 12px;">{materia}</td>
                            </tr>
                            <tr><td class="divider" colspan="2" style="border-top:1px solid #e7ecef;"></td></tr>
                            <tr>
                              <td class="rowKey" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;font-weight:700;color:#169179;padding:10px 12px;width:40%;">🏫 Aula</td>
                              <td class="rowVal" style="font-family:Lato, Arial, Helvetica, sans-serif;font-size:13px;color:#293c4b;padding:10px 12px;">{aula}</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>

            </td>
          </tr>
        </table>

        <!-- BADGE -->
        <table class="wrap" width="550" cellpadding="0" cellspacing="0" role="presentation">
          <tr>
            <td class="badgeWrap" style="padding:18px 10px 26px;text-align:center;">
              <div class="badge" style="display:inline-block;background:#169179;color:#ffffff;padding:12px 16px;border-radius:8px;font-family:Lato, Arial, Helvetica, sans-serif;font-size:12px;line-height:1.4;">
                Mail generata da <strong>GestOre</strong><br>
                {nome_istituto}
              </div>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
