<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GestOre</title>
</head>
<body style="margin:0;padding:0;background:#f3f6f9;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f3f6f9;">
    <tr>
      <td align="center" style="padding:24px 12px;">

        <!-- container -->
        <table role="presentation" width="680" cellpadding="0" cellspacing="0"
               style="max-width:680px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;
                      box-shadow:0 8px 28px rgba(20,40,60,.10);">

          <!-- header -->
          <tr>
            <td style="background:linear-gradient(135deg,#1f6f8b,#2aa198);padding:18px 22px;">
              <div style="font-family:Arial,Helvetica,sans-serif;color:#fff;">
                <div style="font-size:13px;opacity:.95;letter-spacing:.3px;">GestOre</div>
                <div style="font-size:20px;font-weight:800;line-height:1.25;margin-top:6px;">
                  {titolo}
                </div>
              </div>
            </td>
          </tr>

          <!-- body -->
          <tr>
            <td style="padding:22px 22px 10px 22px;">
              <div style="font-family:Arial,Helvetica,sans-serif;color:#1b2b34;">
                <div style="font-size:14px;color:#5b6b78;">Ciao</div>
                <div style="font-size:18px;font-weight:800;margin-top:2px;">
                  {nome}
                </div>

                <!-- message -->
                <div style="margin-top:14px;font-size:14px;line-height:1.55;color:#2b3b45;">
                  {messaggio}
                </div>

                <!-- card details -->
                <div style="margin-top:16px;border:1px solid #e7ecef;border-radius:12px;overflow:hidden;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:12px 14px;background:#f8fafc;border-bottom:1px solid #e7ecef;
                                 font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#5b6b78;">
                        Dettagli attività
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:12px 14px;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                               style="font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#1b2b34;">
                          <tr>
                            <td style="padding:6px 0;color:#5b6b78;width:120px;">Data</td>
                            <td style="padding:6px 0;font-weight:700;">{data}</td>
                          </tr>
                          <tr>
                            <td style="padding:6px 0;color:#5b6b78;">Ora</td>
                            <td style="padding:6px 0;font-weight:700;">{ora}</td>
                          </tr>
                          <tr>
                            <td style="padding:6px 0;color:#5b6b78;">Docente</td>
                            <td style="padding:6px 0;font-weight:700;">{docente}</td>
                          </tr>
                          <tr>
                            <td style="padding:6px 0;color:#5b6b78;">Materia</td>
                            <td style="padding:6px 0;font-weight:700;">{materia}</td>
                          </tr>
                          <tr>
                            <td style="padding:6px 0;color:#5b6b78;">Aula</td>
                            <td style="padding:6px 0;font-weight:700;">{aula}</td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </div>

                <!-- footer note -->
                <div style="margin-top:14px;font-size:12px;line-height:1.5;color:#6b7c88;">
                  Questo messaggio è stato inviato automaticamente da GestOre.
                </div>
              </div>
            </td>
          </tr>

          <!-- footer -->
          <tr>
            <td style="padding:14px 22px 18px 22px;border-top:1px solid #e7ecef;">
              <div style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#6b7c88;">
                {nome_istituto}
              </div>
            </td>
          </tr>
        </table>
        <!-- /container -->

      </td>
    </tr>
  </table>
</body>
</html>
